server {
  listen 80;
  server_name _;

  # Static SPA (CRA build output)
  root /usr/share/nginx/html;
  index index.html;

  # CRA emits hashed assets to /static/. Long cache + immutable.
  location /static/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # The /preview/ folder ships the pitch PDF + screenshots straight from public/.
  location /preview/ {
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Reverse-proxy API to the backend service on the internal docker network.
  # "backend" is the service name in docker-compose.yml.
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA fallback — let React Router handle unknown routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}
